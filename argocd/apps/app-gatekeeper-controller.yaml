# sync-wave ealry 
# Controller -> ConstraintTemplate -> Constraint
# Controller: to download and install the core Gatekeeper engine into your Kubernetes cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: default
  source:
    # Tells Argo CD where to go on the internet 
    # to fetch the installation files for the core OPA Gatekeeper application

    # Think of a Helm repository like an app store for Kubernetes applications:
    # index.yaml = the app-store catalog
    # Helm chart = an application
    # .tgz file = packaged installer
    # Chart version = application version
    # Helm/Argo CD = the installer
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.14.0
  destination: 
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tells Argo CD to build the 'gatekeeper-system' namespace first

  # havent get it
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields