apiVersion: v1
kind: Pod
metadata:
  name: gatekeeper-test
  namespace: demo
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36.1
      command: ["sh", "-c", "sleep 60"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        limits:
          cpu: 100m
          memory: 32Mi