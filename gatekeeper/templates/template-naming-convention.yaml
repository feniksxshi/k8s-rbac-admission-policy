apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredprefixes
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredPrefixes
      validation:
        openAPIV3Schema:
          type: object 
          properties:
            prefixes:
              type: array
              items:
                type: string 
  
  targets: 
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredprefixes

        # Helper function: returns true if the name starts with the prefix
        has_prefix(name, prefix) {
          startswith(name, prefix)
        }

        violation[{"msg": msg}] {
          # 1. Grab the name of the resource being deployed 
          resource_name := input.review.object.metadata.name

          # 2. Get the list of prefixes provided in the Constraint params
          allowed_prefixes := input.parameters.prefixes

          # 3. Check if the resource name matches ANY of the valid prefixes
          valid_matches := {p | p := allowed_prefixes[_]; has_prefix(resource_name, p)}
          count(valid_matches) == 0

          # 4. If it matches zero prefixes, trigger a violation error message
          msg := sprintf("Access denied! The resource name '%v' must start with one of the following prefixes: %v", [resource_name, allowed_prefixes])
        }

        
                

        